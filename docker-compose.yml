services:
  api:
    image: ghcr.io/coveritlabs/coverit-api:${API_TAG:-dev}
    container_name: coverit-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    restart: unless-stopped
